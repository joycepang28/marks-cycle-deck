name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:   # 允许手动触发

permissions:
  contents: write      # 需要写权限才能推送 gh-pages

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Download Chart.js
        run: |
          curl -sL "https://cdn.jsdelivr.net/npm/chart.js@4.4.2/dist/chart.umd.min.js" \
               -o chart.umd.min.js

      - name: Build standalone HTML
        run: python3 build_standalone.py

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: gh-pages
          force_orphan: false
          commit_message: "🚀 Auto-deploy from main (${{ github.sha }})"
