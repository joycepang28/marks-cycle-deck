name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:   # Allow manual trigger from GitHub UI

  # ── Scheduled auto-fetch: every Monday at 01:00 UTC (09:00 SGT) ──
  schedule:
    - cron: '0 1 * * 1'

permissions:
  contents: write      # Needed to commit updated data + push gh-pages

jobs:
  # ────────────────────────────────────────────────────────────
  # Job 1 (scheduled only): fetch latest data, commit to main
  # ────────────────────────────────────────────────────────────
  fetch-data:
    name: Fetch market data
    runs-on: ubuntu-latest
    # Only run on schedule or when manually triggered with update intent
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    outputs:
      data_changed: ${{ steps.check.outputs.changed }}
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Fetch and patch index.html
        id: fetch
        run: python3 fetch_market_data.py

      - name: Check for changes
        id: check
        run: |
          git diff --quiet index.html && echo "changed=false" >> $GITHUB_OUTPUT || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit updated data
        if: steps.check.outputs.changed == 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html fetch_summary.json
          DATE=$(date -u '+%Y-%m-%d')
          git commit -m "data: auto-fetch market data ${DATE} [skip ci]"
          git push origin main

      - name: No changes
        if: steps.check.outputs.changed == 'false'
        run: echo "No data changes detected — skipping commit."

  # ────────────────────────────────────────────────────────────
  # Job 2: build standalone HTML and deploy to gh-pages
  # Runs on every push to main (including data commits above)
  # ────────────────────────────────────────────────────────────
  deploy:
    name: Build & deploy to gh-pages
    runs-on: ubuntu-latest
    # On schedule/dispatch: wait for fetch-data to finish first
    needs: [fetch-data]
    if: |
      always() &&
      (github.event_name == 'push' ||
       needs.fetch-data.outputs.data_changed == 'true' ||
       github.event_name == 'workflow_dispatch')
    steps:
      - name: Checkout main (latest, after data commit)
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Download Chart.js
        run: |
          curl -sL "https://cdn.jsdelivr.net/npm/chart.js@4.4.2/dist/chart.umd.min.js" \
               -o chart.umd.min.js

      - name: Build standalone HTML
        run: python3 build_standalone.py

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: gh-pages
          force_orphan: false
          commit_message: "deploy: ${{ github.sha }} — $(date -u '+%Y-%m-%d')"
